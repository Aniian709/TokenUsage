  <head>

    <meta name="description" content="Share a TokenUsage dashboard snapshot with token usage insights across models, projects, and time windows." />

    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        background: #050b08;
      }

      .frame {
        width: min(920px, 100%);
        padding: 24px 12px 48px;
        box-sizing: border-box;
      }

      img {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 16px;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
      }
    </style>
  </head>
  <body>
    <main class="frame">
      <img src="/wrapped-2025.png" alt="Share a TokenUsage dashboard snapshot with token usage insights across models, projects, and time windows." />
    </main>
    <script>
      (function () {
        var host = window.location.hostname;
        if (host === "www.tokenusage.cc") {
          window.location.replace("/");
        }
      })();
    </script>
  </body>
